name: Auto Post Articles

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Generate articles
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AMAZON_TRACKING_ID: ${{ secrets.AMAZON_TRACKING_ID }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
        run: node scripts/auto-generate.js
      - name: Commit and push
        id: commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add content/blog/
          git diff --staged --quiet || (git commit -m "auto: add articles $(date '+%Y-%m-%d %H:%M')" && echo "committed=true" >> $GITHUB_OUTPUT)
          git push
      - name: Post to X
        if: steps.commit.outputs.committed == 'true'
        env:
          X_CONSUMER_KEY: ${{ secrets.X_CONSUMER_KEY }}
          X_CONSUMER_SECRET: ${{ secrets.X_CONSUMER_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: |
          node -e "
          const https = require('https');
          const crypto = require('crypto');
          const fs = require('fs');
          const path = require('path');
          const CK = process.env.X_CONSUMER_KEY;
          const CS = process.env.X_CONSUMER_SECRET;
          const AT = process.env.X_ACCESS_TOKEN;
          const ATS = process.env.X_ACCESS_TOKEN_SECRET;
          const blogDir = path.join(process.cwd(), 'content/blog');
          const files = fs.readdirSync(blogDir).filter(f=>f.endsWith('.mdx')).sort().reverse();
          if (!files.length) process.exit(0);
          const latest = fs.readFileSync(path.join(blogDir, files[0]), 'utf8');
          const titleMatch = latest.match(/title: [\"']?([^\"'\n]+)[\"']?/);
          const title = titleMatch ? titleMatch[1] : '新着記事';
          const short = title.length > 60 ? title.slice(0,60) + '…' : title;
          const text = short + '\n\n' + 'https://yoga-note-jp.vercel.app/blog' + '\n\n#ヨガ #瞑想 #健康';
          const nonce = crypto.randomBytes(16).toString('hex');
          const ts = Math.floor(Date.now()/1000).toString();
          const params = {oauth_consumer_key:CK,oauth_nonce:nonce,oauth_signature_method:'HMAC-SHA1',oauth_timestamp:ts,oauth_token:AT,oauth_version:'1.0'};
          const baseStr = 'POST&'+encodeURIComponent('https://api.twitter.com/2/tweets')+'&'+encodeURIComponent(Object.keys(params).sort().map(k=>k+'='+encodeURIComponent(params[k])).join('&'));
          const sig = crypto.createHmac('sha1',encodeURIComponent(CS)+'&'+encodeURIComponent(ATS)).update(baseStr).digest('base64');
          params.oauth_signature = sig;
          const authHeader = 'OAuth '+Object.keys(params).sort().map(k=>k+'=\"'+encodeURIComponent(params[k])+'\"').join(', ');
          const body = JSON.stringify({text});
          const req = https.request({hostname:'api.twitter.com',path:'/2/tweets',method:'POST',headers:{'Authorization':authHeader,'Content-Type':'application/json','Content-Length':Buffer.byteLength(body)}},res=>{let d='';res.on('data',c=>d+=c);res.on('end',()=>console.log('X:',res.statusCode));});
          req.on('error',e=>console.error(e.message));
          req.write(body);req.end();
          "
